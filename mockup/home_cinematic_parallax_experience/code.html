<style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const bgLayer = document.querySelector('.parallax-layer-bg');
        const sceneLayer = document.querySelector('.parallax-layer-scene');
        const flowersLayer = document.querySelector('.parallax-layer-flowers');
        const contentLayer = document.querySelector('.hero-content');
        const ctas = document.querySelectorAll('.parallax-cta');
        const overlay = document.querySelector('.hero-overlay');

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            
            // Parallax logic
            if (bgLayer) bgLayer.style.transform = `translateY(${scrollY * 0.15}px) scale(${1 + scrollY * 0.0001})`;
            if (sceneLayer) sceneLayer.style.transform = `translateY(${scrollY * 0.25}px)`;
            if (flowersLayer) flowersLayer.style.transform = `translateY(${scrollY * 0.4}px)`;
            if (contentLayer) {
                contentLayer.style.transform = `translateY(${scrollY * -0.2}px)`;
                contentLayer.style.opacity = Math.max(1 - (scrollY / 500), 0);
            }
            
            ctas.forEach(cta => {
                if (cta) cta.style.transform = `scale(${Math.max(1 - (scrollY * 0.001), 0.8)})`;
            });
            
            if (overlay) {
                 overlay.style.opacity = Math.min(1, 0.4 + (scrollY / 1000));
            }
        });
    });
</script>
